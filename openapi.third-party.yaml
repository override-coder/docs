        max_5m_market_end_time:
          type: string
          description: Latest allowed end-time window for 5-minute markets. String
            forwarded to master `max_5m_market_end_time`.
        max_15m_market_start_time:
          type: string
          description: Earliest allowed start-time window for 15-minute markets. String
