          type: boolean
          description: Whether buy copy should use minimum-price behavior. Maps to
            master `buy_at_min`.
        copy_fixed_amount:
          type: string
          description: Fixed amount to copy per trade. Decimal string forwarded to
            master `copy_fixed_amount`.
        min_trader_trade_amount:
          type: string
          description: Minimum source trader trade amount required before copying.
            Decimal string forwarded to master `min_trader_trade_amount`.
        max_trader_trade_amount:
          type: string
          description: Maximum source trader trade amount allowed for copying. Decimal
            string forwarded to master `max_trader_trade_amount`.
        min_copy_amount_per_trade:
          type: string
          description: Minimum copied amount per trade. Decimal string forwarded to
