openapi: 3.0.3
info:
  title: PolyCop OpenAPI
  version: 0.1.0
  license:
    name: Proprietary
  description: |
    Public third-party API for the openapi gateway service.

    This document only exposes API Key authenticated endpoints. All requests use HMAC-SHA256 signatures with `X-API-Key`, `X-Timestamp`, `X-Nonce`, and `X-Signature`.

    Core constraints:
    - Custodial wallet only.
    - API key requests use HMAC-SHA256 signatures.
    - API key trading does not require TOTP.
    - Withdraw requires TOTP and only supports Polygon in v1.
    - `openapi_account_id` is public; `master_telegram_id` is internal.
    - This is not a Polymarket CLOB-compatible API.
servers:
- url: https://test-eu.polycopy.fun/openapi/v1
  description: Verified test environment
x-doc-classification:
  level_1:
  - Third-party API
  level_2:
    Third-party API:
      programmatic_trading: API key plus HMAC
  level_3:
    Third-party API:
    - wallet
    - orders
    - positions
    - copytrade
    - afk
    - withdraw
    - partner
tags:
- name: Wallet
  description: Custodial wallet balance and Polygon withdrawal APIs.
- name: Orders
  description: Programmatic order placement, listing, lookup, and cancellation.
- name: Positions
  description: Account position query APIs.
- name: Copytrade
  description: Copytrade configuration, market filters, keywords, and execution records.
- name: AFK
  description: AFK strategy configuration and execution records.
- name: Partner
  description: Partner-only APIs for provisioning partner users and creating user API keys.
paths:
  "/wallet":
    get:
      tags:
      - Wallet
      summary: Get wallet and balances
      operationId: getWallet
      security:
      - ApiKeyAuth: []
        ApiTimestamp: []
        ApiNonce: []
        ApiSignature: []
      parameters:
      - "$ref": "#/components/parameters/ForceRefresh"
      responses:
        '200':
          description: Wallet
          content:
            application/json:
              schema:
                allOf:
                - "$ref": "#/components/schemas/ApiResponse"
                - type: object
                  properties:
                    data:
                      "$ref": "#/components/schemas/Wallet"
        '401':
          "$ref": "#/components/responses/Unauthorized"
  "/wallet/withdraw":
    post:
      tags:
      - Wallet
      summary: Create a Polygon withdrawal
      operationId: createWithdrawal
      parameters:
      - "$ref": "#/components/parameters/RequiredIdempotencyKey"
      description: |
        API key signed request. Withdraw requires TOTP, Idempotency-Key, and only supports Polygon in v1.
        `Idempotency-Key` is mandatory for this endpoint. It identifies one business withdrawal request.
        Client retries after timeout or network failure must reuse the same `Idempotency-Key` and
        exactly the same JSON body; each retry still needs a fresh `X-Timestamp`, `X-Nonce`, and
        `X-Signature`. Reusing the same key with a different body is rejected with `CONFLICT`.

        Rate limit: each account may call this endpoint up to 5 times per minute.
        Concurrency rule: each account may have only one unfinished withdrawal. Statuses
        `processing`, `submitting`, and `submitted` are unfinished; a new withdrawal can be
        created only after the previous withdrawal becomes `succeeded` or `failed`.
      security:
      - ApiKeyAuth: []
        ApiTimestamp: []
        ApiNonce: []
        ApiSignature: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              "$ref": "#/components/schemas/CreateWithdrawalRequest"
      responses:
        '200':
          description: Withdrawal created
          content:
            application/json:
              schema:
                allOf:
                - "$ref": "#/components/schemas/ApiResponse"
                - type: object
                  properties:
                    data:
                      "$ref": "#/components/schemas/WithdrawalCreated"
        '403':
          "$ref": "#/components/responses/Forbidden"
        '409':
          "$ref": "#/components/responses/Conflict"
        '422':
          "$ref": "#/components/responses/ValidationFailed"
        '429':
          "$ref": "#/components/responses/RateLimited"
  "/wallet/withdrawals/{withdraw_id}":
    get:
      tags:
      - Wallet
      summary: Get withdrawal status
      operationId: getWithdrawal
      security:
      - ApiKeyAuth: []
        ApiTimestamp: []
        ApiNonce: []
        ApiSignature: []
      parameters:
      - "$ref": "#/components/parameters/WithdrawId"
      responses:
        '200':
          description: Withdrawal status
          content:
            application/json:
              schema:
                allOf:
                - "$ref": "#/components/schemas/ApiResponse"
                - type: object
                  properties:
                    data:
                      "$ref": "#/components/schemas/Withdrawal"
        '404':
          "$ref": "#/components/responses/NotFound"
  "/orders":
    post:
      tags:
      - Orders
      summary: Place an order
      operationId: placeOrder
      parameters:
      - "$ref": "#/components/parameters/IdempotencyKey"
      security:
      - ApiKeyAuth: []
        ApiTimestamp: []
        ApiNonce: []
        ApiSignature: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              "$ref": "#/components/schemas/PlaceOrderRequest"
      responses:
        '200':
          description: Order accepted
          content:
            application/json:
              schema:
                allOf:
                - "$ref": "#/components/schemas/ApiResponse"
                - type: object
                  properties:
                    data:
                      "$ref": "#/components/schemas/OrderResult"
        '422':
          "$ref": "#/components/responses/ValidationFailed"
    get:
      tags:
      - Orders
      summary: List account orders
      description: Returns an empty `items` array when the account has no matching
        orders.
      operationId: listOrders
      security:
      - ApiKeyAuth: []
        ApiTimestamp: []
        ApiNonce: []
        ApiSignature: []
      parameters:
      - "$ref": "#/components/parameters/AddressQuery"
      - "$ref": "#/components/parameters/LocaleQuery"
      responses:
        '200':
          description: Orders
          content:
            application/json:
              schema:
                allOf:
                - "$ref": "#/components/schemas/ApiResponse"
                - type: object
                  properties:
                    data:
                      "$ref": "#/components/schemas/OrderList"
        '401':
          "$ref": "#/components/responses/Unauthorized"
  "/orders/{order_id}":
    get:
      tags:
      - Orders
      summary: Get an order by master order id
      description: Returns `ORDER_NOT_FOUND` when the order does not exist or does
        not belong to the current account.
      operationId: getOrder
      security:
      - ApiKeyAuth: []
        ApiTimestamp: []
        ApiNonce: []
        ApiSignature: []
      parameters:
      - "$ref": "#/components/parameters/OrderId"
      - "$ref": "#/components/parameters/AddressQuery"
      - "$ref": "#/components/parameters/LocaleQuery"
      responses:
        '200':
          description: Order
          content:
            application/json:
              schema:
                allOf:
                - "$ref": "#/components/schemas/ApiResponse"
                - type: object
                  properties:
                    data:
                      "$ref": "#/components/schemas/Order"
        '404':
          "$ref": "#/components/responses/NotFound"
    delete:
      tags:
      - Orders
      summary: Cancel an order
      operationId: cancelOrder
      parameters:
      - "$ref": "#/components/parameters/IdempotencyKey"
      - "$ref": "#/components/parameters/OrderId"
      security:
      - ApiKeyAuth: []
        ApiTimestamp: []
        ApiNonce: []
        ApiSignature: []
      responses:
        '200':
          description: Cancel requested
          content:
            application/json:
              schema:
                allOf:
                - "$ref": "#/components/schemas/ApiResponse"
                - type: object
                  properties:
                    data:
                      "$ref": "#/components/schemas/CancelOrderData"
        '401':
          "$ref": "#/components/responses/Unauthorized"
  "/positions":
    get:
      tags:
      - Positions
      summary: List account positions
      operationId: listPositions
      security:
      - ApiKeyAuth: []
        ApiTimestamp: []
        ApiNonce: []
        ApiSignature: []
      parameters:
      - "$ref": "#/components/parameters/AddressQuery"
      - "$ref": "#/components/parameters/MarketQuery"
      - "$ref": "#/components/parameters/RedeemableQuery"
      responses:
        '200':
          description: Positions
          content:
            application/json:
              schema:
                allOf:
                - "$ref": "#/components/schemas/ApiResponse"
                - type: object
                  properties:
                    data:
                      "$ref": "#/components/schemas/PositionList"
        '401':
          "$ref": "#/components/responses/Unauthorized"
  "/copytrade/configs":
    get:
      tags:
      - Copytrade
      summary: List copytrade configs
      description: Returns an empty `items` array when the account has no copytrade
        configs.
      operationId: listCopytradeConfigs
      security:
      - ApiKeyAuth: []
        ApiTimestamp: []
        ApiNonce: []
        ApiSignature: []
      parameters:
      - "$ref": "#/components/parameters/Limit"
      - "$ref": "#/components/parameters/Cursor"
      responses:
        '200':
          description: Copytrade configs
          content:
            application/json:
              schema:
                allOf:
                - "$ref": "#/components/schemas/ApiResponse"
                - type: object
                  properties:
                    data:
                      "$ref": "#/components/schemas/CopytradeConfigList"
        '400':
          "$ref": "#/components/responses/BadRequest"
    post:
      tags:
      - Copytrade
      summary: Create a copytrade config
      description: |
        Create a copytrade configuration for the account represented by the API key.

        This endpoint is included in v1. It requires API key HMAC signature and
        does not require TOTP. The openapi service creates the config for the
        trading account represented by the API key.
      operationId: createCopytradeConfig
      parameters:
      - "$ref": "#/components/parameters/IdempotencyKey"
      security:
      - ApiKeyAuth: []
        ApiTimestamp: []
        ApiNonce: []
        ApiSignature: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              "$ref": "#/components/schemas/CopytradeConfigInput"
            example:
              target_address: '0x0000000000000000000000000000000000000000'
              tag: leader A
              copy_percentage: '100'
              copy_fixed_amount: ''
              max_token_spend: '1000'
              total_token_spend: '5000'
              min_copy_amount_per_trade: '1'
              max_copy_amount_per_trade: '100'
              min_price: '0.01'
              max_price: '0.99'
              slippage: '2'
              copy_buy: true
              copy_sell: true
              limit_order_copy: false
              sell_limit_order_copy: false
              reverse_copy: false
              keyword_whitelist: []
              keyword_blacklist: []
      responses:
        '200':
          description: Copytrade config created
          content:
            application/json:
              schema:
                allOf:
                - "$ref": "#/components/schemas/ApiResponse"
                - type: object
                  properties:
                    data:
                      "$ref": "#/components/schemas/CopytradeConfig"
        '401':
          "$ref": "#/components/responses/Unauthorized"
        '422':
          "$ref": "#/components/responses/ValidationFailed"
        '429':
          "$ref": "#/components/responses/RateLimited"
        '502':
          "$ref": "#/components/responses/DependencyUnavailable"
  "/copytrade/configs/{config_id}":
    get:
      tags:
      - Copytrade
      summary: Get a copytrade config
      description: Returns `COPYTRADE_CONFIG_NOT_FOUND` when the config does not exist
        or does not belong to the current account.
      operationId: getCopytradeConfig
      parameters:
      - "$ref": "#/components/parameters/ConfigId"
      security:
      - ApiKeyAuth: []
        ApiTimestamp: []
        ApiNonce: []
        ApiSignature: []
      responses:
        '200':
          description: Copytrade config
          content:
            application/json:
              schema:
                allOf:
                - "$ref": "#/components/schemas/ApiResponse"
                - type: object
                  properties:
                    data:
                      "$ref": "#/components/schemas/CopytradeConfig"
        '404':
          "$ref": "#/components/responses/NotFound"
    patch:
      tags:
      - Copytrade
      summary: Update a copytrade config
      description: Updates copytrade config fields supported by the master update
        RPC. `target_address` is optional for PATCH; when omitted the target address
        is not changed. Public boolean fields are desired final states and the gateway
        translates them to the current master toggle protocol. `keyword_whitelist`
        and `keyword_blacklist` are create-only in v1 and are rejected on update.
      operationId: updateCopytradeConfig
      parameters:
      - "$ref": "#/components/parameters/IdempotencyKey"
      - "$ref": "#/components/parameters/ConfigId"
      security:
      - ApiKeyAuth: []
        ApiTimestamp: []
        ApiNonce: []
        ApiSignature: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              "$ref": "#/components/schemas/CopytradeConfigUpdateInput"
      responses:
        '200':
          description: Copytrade config updated
          content:
            application/json:
              schema:
                allOf:
                - "$ref": "#/components/schemas/ApiResponse"
                - type: object
                  properties:
                    data:
                      "$ref": "#/components/schemas/CopytradeConfig"
        '404':
          "$ref": "#/components/responses/NotFound"
        '422':
          "$ref": "#/components/responses/ValidationFailed"
    delete:
      tags:
      - Copytrade
      summary: Disable a copytrade config
      operationId: deleteCopytradeConfig
      parameters:
      - "$ref": "#/components/parameters/IdempotencyKey"
      - "$ref": "#/components/parameters/ConfigId"
      security:
      - ApiKeyAuth: []
        ApiTimestamp: []
        ApiNonce: []
        ApiSignature: []
      responses:
        '200':
          description: Copytrade config disabled
          content:
            application/json:
              schema:
                allOf:
                - "$ref": "#/components/schemas/ApiResponse"
                - type: object
                  properties:
                    data:
                      "$ref": "#/components/schemas/CopytradeConfig"
        '404':
          "$ref": "#/components/responses/NotFound"
  "/copytrade/configs/{config_id}/keywords":
    post:
      tags:
      - Copytrade
      summary: Add a copytrade keyword
      description: |
        Adds one keyword to a copytrade config whitelist or blacklist. This endpoint maps directly to master `CreateCopyTradeConfigKeyWord`.

        Use this endpoint instead of PATCH `/copytrade/configs/{config_id}` for keyword changes.
      operationId: createCopytradeConfigKeyword
      parameters:
      - "$ref": "#/components/parameters/IdempotencyKey"
      - "$ref": "#/components/parameters/ConfigId"
      security:
      - ApiKeyAuth: []
        ApiTimestamp: []
        ApiNonce: []
        ApiSignature: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              "$ref": "#/components/schemas/CopytradeKeywordInput"
            example:
              key_word: election
              list_type: 1
              config_type: 1
      responses:
        '200':
          description: Keyword added
          content:
            application/json:
              schema:
                allOf:
                - "$ref": "#/components/schemas/ApiResponse"
                - type: object
                  properties:
                    data:
                      type: object
        '400':
          "$ref": "#/components/responses/BadRequest"
        '404':
          "$ref": "#/components/responses/NotFound"
        '422':
          "$ref": "#/components/responses/ValidationFailed"
  "/copytrade/configs/{config_id}/keywords/{key_word_id}":
    delete:
      tags:
      - Copytrade
      summary: Delete a copytrade keyword
      description: 'Deletes one keyword binding from a copytrade config. OpenAPI first
        checks that `config_id` belongs to the current account, then calls master
        `DelCopyTradeConfigKeyWord` with `key_word_id`.

'
      operationId: deleteCopytradeConfigKeyword
      parameters:
      - "$ref": "#/components/parameters/IdempotencyKey"
      - "$ref": "#/components/parameters/ConfigId"
      - "$ref": "#/components/parameters/KeyWordId"
      security:
      - ApiKeyAuth: []
        ApiTimestamp: []
        ApiNonce: []
        ApiSignature: []
      responses:
        '200':
          description: Keyword deleted
          content:
            application/json:
              schema:
                allOf:
                - "$ref": "#/components/schemas/ApiResponse"
                - type: object
                  properties:
                    data:
                      type: object
        '404':
          "$ref": "#/components/responses/NotFound"
  "/copytrade/configs/{config_id}/market-types":
    patch:
      tags:
      - Copytrade
      summary: Update copytrade market type filters
      description: |
        Updates the market-type switches for a copytrade config. This endpoint maps directly to master `UpdateCopyMarketsTypes`.

        Each market type field follows `tx.proto`/`param.proto`: `1` means enabled, `2` means disabled. Omit a field to leave that switch unchanged. `config_id` comes from the path; do not send it in the body.
      operationId: updateCopytradeMarketTypes
      parameters:
      - "$ref": "#/components/parameters/IdempotencyKey"
      - "$ref": "#/components/parameters/ConfigId"
      security:
      - ApiKeyAuth: []
        ApiTimestamp: []
        ApiNonce: []
        ApiSignature: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              "$ref": "#/components/schemas/CopytradeMarketTypesInput"
            example:
              config_type: 1
              crypto: 1
              sports: 2
      responses:
        '200':
          description: Market types updated
          content:
            application/json:
              schema:
                allOf:
                - "$ref": "#/components/schemas/ApiResponse"
                - type: object
                  properties:
                    data:
                      type: object
        '400':
          "$ref": "#/components/responses/BadRequest"
        '404':
          "$ref": "#/components/responses/NotFound"
        '422':
          "$ref": "#/components/responses/ValidationFailed"
  "/afk/strategies":
    get:
      tags:
      - AFK
      summary: List AFK strategies
      description: Lists AFK automatic trading strategies owned by the current account.
        Maps to master `GetAFKStrategies`.
      operationId: listAFKStrategies
      security:
      - ApiKeyAuth: []
        ApiTimestamp: []
        ApiNonce: []
        ApiSignature: []
      responses:
        '200':
          description: AFK strategies
          content:
            application/json:
              schema:
                allOf:
                - "$ref": "#/components/schemas/ApiResponse"
                - type: object
                  properties:
                    data:
                      "$ref": "#/components/schemas/AFKStrategyList"
        '401':
          "$ref": "#/components/responses/Unauthorized"
    post:
      tags:
      - AFK
      summary: Create an AFK strategy
      description: Creates an AFK automatic trading strategy. Maps to master `CreateAFKStrategy`.
      operationId: createAFKStrategy
      parameters:
      - "$ref": "#/components/parameters/IdempotencyKey"
      security:
      - ApiKeyAuth: []
        ApiTimestamp: []
        ApiNonce: []
        ApiSignature: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              "$ref": "#/components/schemas/AFKStrategyInput"
      responses:
        '200':
          description: AFK strategy created
          content:
            application/json:
              schema:
                allOf:
                - "$ref": "#/components/schemas/ApiResponse"
                - type: object
                  properties:
                    data:
                      "$ref": "#/components/schemas/AFKStrategy"
        '422':
          "$ref": "#/components/responses/ValidationFailed"
  "/afk/strategies/{strategy_id}":
    get:
      tags:
      - AFK
      summary: Get an AFK strategy
      description: Returns one AFK strategy owned by the current account. Maps to
        master `GetAFKStrategy`.
      operationId: getAFKStrategy
      parameters:
      - "$ref": "#/components/parameters/StrategyId"
      security:
      - ApiKeyAuth: []
        ApiTimestamp: []
        ApiNonce: []
        ApiSignature: []
      responses:
        '200':
          description: AFK strategy
          content:
            application/json:
              schema:
                allOf:
                - "$ref": "#/components/schemas/ApiResponse"
                - type: object
                  properties:
                    data:
                      "$ref": "#/components/schemas/AFKStrategy"
        '404':
          "$ref": "#/components/responses/NotFound"
    patch:
      tags:
      - AFK
      summary: Update an AFK strategy
      description: Updates an AFK automatic trading strategy. Maps to master `UpdateAFKStrategy`.
      operationId: updateAFKStrategy
      parameters:
      - "$ref": "#/components/parameters/IdempotencyKey"
      - "$ref": "#/components/parameters/StrategyId"
      security:
      - ApiKeyAuth: []
        ApiTimestamp: []
        ApiNonce: []
        ApiSignature: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              "$ref": "#/components/schemas/AFKStrategyUpdateInput"
      responses:
        '200':
          description: AFK strategy updated
          content:
            application/json:
              schema:
                allOf:
                - "$ref": "#/components/schemas/ApiResponse"
                - type: object
                  properties:
                    data:
                      "$ref": "#/components/schemas/AFKStrategy"
        '404':
          "$ref": "#/components/responses/NotFound"
        '422':
          "$ref": "#/components/responses/ValidationFailed"
  "/afk/records":
    get:
      tags:
      - AFK
      summary: List AFK records
      description: Returns AFK transaction records from master `GetAFKRecords`, backed
        by `tg_afk_records`, with cursor pagination.
      operationId: listAFKRecords
      security:
      - ApiKeyAuth: []
        ApiTimestamp: []
        ApiNonce: []
        ApiSignature: []
      parameters:
      - name: strategy_id
        in: query
        required: false
        schema:
          type: integer
          minimum: 1
        description: AFK strategy id filter.
      - name: status
        in: query
        required: false
        schema:
          type: integer
          enum:
          - 1
          - 2
          - 3
          - 4
          - 5
        description: 'Optional AFK record status filter: 1=success, 2=failed, 3=waiting,
          4=cancel, 5=partially. When status is 2, `error_msg` contains the failure
          reason.'
      - "$ref": "#/components/parameters/Limit"
      - "$ref": "#/components/parameters/Cursor"
      responses:
        '200':
          description: AFK record list
          content:
            application/json:
              schema:
                allOf:
                - "$ref": "#/components/schemas/ApiResponse"
                - type: object
                  properties:
                    data:
                      "$ref": "#/components/schemas/AFKRecordList"
        '400':
          "$ref": "#/components/responses/BadRequest"
  "/copytrade/records":
    get:
      tags:
      - Copytrade
      summary: List copytrade records
      operationId: listCopytradeRecords
      security:
      - ApiKeyAuth: []
        ApiTimestamp: []
        ApiNonce: []
        ApiSignature: []
      parameters:
      - name: config_id
        in: query
        required: false
        schema:
          type: integer
          minimum: 1
      - name: status
        in: query
        required: false
        schema:
          type: integer
          enum:
          - 1
          - 2
          - 3
          - 4
          - 5
        description: 'Optional record status filter: 1=success, 2=failed, 3=waiting,
          4=cancel, 5=partially. When status is 2, `error_msg` contains the failure
          reason when returned by master.'
      - "$ref": "#/components/parameters/Limit"
      - "$ref": "#/components/parameters/Cursor"
      responses:
        '200':
          description: Copytrade records
          content:
            application/json:
              schema:
                allOf:
                - "$ref": "#/components/schemas/ApiResponse"
                - type: object
                  properties:
                    data:
                      "$ref": "#/components/schemas/CopytradeRecordList"
        '400':
          "$ref": "#/components/responses/BadRequest"
  "/partner/users":
    get:
      tags:
      - Partner
      summary: List partner users
      operationId: listPartnerUsers
      description: Requires a partner API key with `partner:users:manage` or `*` scope. Returns paginated non-sensitive partner user information, including public wallet addresses and recent activity time.
      security:
      - ApiKeyAuth: []
        ApiTimestamp: []
        ApiNonce: []
        ApiSignature: []
      parameters:
      - "$ref": "#/components/parameters/Limit"
      - "$ref": "#/components/parameters/Cursor"
      responses:
        '200':
          description: Partner user list
          content:
            application/json:
              schema:
                allOf:
                - "$ref": "#/components/schemas/ApiResponse"
                - type: object
                  properties:
                    data:
                      "$ref": "#/components/schemas/PartnerUserListData"
        '400':
          "$ref": "#/components/responses/BadRequest"
        '401':
          "$ref": "#/components/responses/Unauthorized"
        '403':
          "$ref": "#/components/responses/Forbidden"
    post:
      tags:
      - Partner
      summary: Create or get a partner user
      operationId: createPartnerUser
      description: Requires a partner API key with `partner:users:manage` or `*` scope. If the user already exists for the same `external_user_id`, this endpoint returns that user and may retry wallet initialization when needed.
      security:
      - ApiKeyAuth: []
        ApiTimestamp: []
        ApiNonce: []
        ApiSignature: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              "$ref": "#/components/schemas/PartnerUserCreateRequest"
      responses:
        '200':
          description: Partner user created or returned
          content:
            application/json:
              schema:
                allOf:
                - "$ref": "#/components/schemas/ApiResponse"
                - type: object
                  properties:
                    data:
                      "$ref": "#/components/schemas/PartnerUserData"
        '400':
          "$ref": "#/components/responses/BadRequest"
        '401':
          "$ref": "#/components/responses/Unauthorized"
        '403':
          "$ref": "#/components/responses/Forbidden"
        '404':
          "$ref": "#/components/responses/NotFound"
  "/partner/users/{user_account_id}/api-keys":
    post:
      tags:
      - Partner
      summary: Create a user API key for a partner user
      operationId: createPartnerUserApiKey
      description: Requires a partner API key with `partner:api_keys:manage` or `*` scope. The partner user must have `wallet_status=ready`; if it is `pending` or `failed`, retry create-or-get for the same `external_user_id` before creating the user API key. The returned secret is shown only once.
      parameters:
      - "$ref": "#/components/parameters/IdempotencyKey"
      - name: user_account_id
        in: path
        required: true
        schema:
          "$ref": "#/components/schemas/AccountId"
      security:
      - ApiKeyAuth: []
        ApiTimestamp: []
        ApiNonce: []
        ApiSignature: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              "$ref": "#/components/schemas/PartnerUserApiKeyCreateRequest"
      responses:
        '200':
          description: User API key created. Secret is shown only once.
          content:
            application/json:
              schema:
                allOf:
                - "$ref": "#/components/schemas/ApiResponse"
                - type: object
                  properties:
                    data:
                      "$ref": "#/components/schemas/CreateApiKeyData"
        '400':
          "$ref": "#/components/responses/BadRequest"
        '401':
          "$ref": "#/components/responses/Unauthorized"
        '403':
          "$ref": "#/components/responses/Forbidden"
        '404':
          "$ref": "#/components/responses/NotFound"
        '409':
          "$ref": "#/components/responses/Conflict"
components:
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key
      description: API key id.
    ApiTimestamp:
      type: apiKey
      in: header
      name: X-Timestamp
      description: Unix timestamp in seconds. Allowed clock skew is 30 seconds.
    ApiNonce:
      type: apiKey
      in: header
      name: X-Nonce
      description: Random nonce. It must not repeat within the timestamp window.
    ApiSignature:
      type: apiKey
      in: header
      name: X-Signature
      description: |
        HMAC-SHA256 signature.

        Canonical string:
        `METHOD + "\n" + PATH + "\n" + QUERY + "\n" + TIMESTAMP + "\n" + NONCE + "\n" + BODY_SHA256`.
  parameters:
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: false
      description: Optional idempotency key. V1 does not reject requests that omit
        it.
      schema:
        type: string
        maxLength: 128
    RequiredIdempotencyKey:
      name: Idempotency-Key
      in: header
      required: true
      description: Required for withdrawals. This key identifies one business withdrawal
        request and prevents duplicate withdrawal creation or submission when the
        client retries after timeout, network failure, or double-click. Retry the
        same withdrawal with the same Idempotency-Key and exactly the same request
        body. Use a fresh timestamp, nonce, and signature for every signed HTTP request.
        Reusing the same key with a different body returns CONFLICT.
      schema:
        type: string
        maxLength: 128
    WithdrawId:
      name: withdraw_id
      in: path
      required: true
      schema:
        type: string
        example: wd_202606011200000001
    OrderId:
      name: order_id
      in: path
      required: true
      schema:
        type: string
        example: 0xorder
    ConfigId:
      name: config_id
      in: path
      required: true
      schema:
        type: string
        example: '123'
    KeyWordId:
      name: key_word_id
      in: path
      required: true
      description: Keyword record id returned by master/query data. Used only to delete
        the keyword binding.
      schema:
        type: integer
        minimum: 1
        example: 456
    StrategyId:
      name: strategy_id
      in: path
      required: true
      description: AFK strategy config id.
      schema:
        type: string
        example: '123'
    Limit:
      name: limit
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 200
        default: 50
    Cursor:
      name: cursor
      in: query
      required: false
      schema:
        type: string
      description: Cursor returned as `next_cursor` from the previous page. OpenAPI
        does not support offset pagination.
    ForceRefresh:
      name: force_refresh
      in: query
      required: false
      schema:
        type: boolean
        default: false
      description: Optional wallet refresh flag forwarded to master. Omit or use false
        for normal cached wallet reads.
    AddressQuery:
      name: address
      in: query
      required: false
      schema:
        type: string
      description: Optional wallet address filter forwarded to master query APIs.
    LocaleQuery:
      name: locale
      in: query
      required: false
      schema:
        type: string
        example: en
      description: Optional locale forwarded to master order query APIs.
    MarketQuery:
      name: market
      in: query
      required: false
      style: form
      explode: true
      schema:
        type: array
        items:
          type: string
      description: Optional repeated market filters, for example `?market=a&market=b`.
    RedeemableQuery:
      name: redeemable
      in: query
      required: false
      schema:
        type: boolean
      description: Optional redeemable-position filter.
  responses:
    BadRequest:
      description: Bad request
      content:
        application/json:
          schema:
            "$ref": "#/components/schemas/ErrorResponse"
    Unauthorized:
      description: Authentication failed
      content:
        application/json:
          schema:
            "$ref": "#/components/schemas/ErrorResponse"
    Forbidden:
      description: Forbidden
      content:
        application/json:
          schema:
            "$ref": "#/components/schemas/ErrorResponse"
    NotFound:
      description: Not found
      content:
        application/json:
          schema:
            "$ref": "#/components/schemas/ErrorResponse"
    Conflict:
      description: Conflict
      content:
        application/json:
          schema:
            "$ref": "#/components/schemas/ErrorResponse"
    ValidationFailed:
      description: Validation failed
      content:
        application/json:
          schema:
            "$ref": "#/components/schemas/ErrorResponse"
    RateLimited:
      description: Rate limited
      headers:
        Retry-After:
          description: Seconds to wait before retrying the same rate-limited bucket.
          schema:
            type: integer
            minimum: 1
        X-RateLimit-Limit:
          description: Effective limit for the bucket that rejected the request.
          schema:
            type: integer
            minimum: 1
        X-RateLimit-Remaining:
          description: Remaining tokens in the bucket that rejected the request. Usually
            0 on 429.
          schema:
            type: integer
            minimum: 0
        X-RateLimit-Reset:
          description: Seconds until the bucket is expected to accept another request.
          schema:
            type: integer
            minimum: 1
      content:
        application/json:
          schema:
            "$ref": "#/components/schemas/ErrorResponse"
    DependencyUnavailable:
      description: Upstream service unavailable
      content:
        application/json:
          schema:
            "$ref": "#/components/schemas/ErrorResponse"
  schemas:
    ApiResponse:
      type: object
      required:
      - code
      - message
      - data
      - request_id
      properties:
        code:
          type: string
          example: OK
        message:
          type: string
          example: success
        data:
          description: Response payload. The concrete type is defined by each operation.
        request_id:
          type: string
          example: req_202606011200000001
    ErrorResponse:
      allOf:
      - "$ref": "#/components/schemas/ApiResponse"
      - type: object
        properties:
          code:
            "$ref": "#/components/schemas/ErrorCode"
          data:
            type: object
            nullable: true
            example: null
    ErrorCode:
      type: string
      enum:
      - OK
      - BAD_REQUEST
      - UNAUTHORIZED
      - FORBIDDEN
      - NOT_FOUND
      - VALIDATION_FAILED
      - CONFLICT
      - RATE_LIMITED
      - INTERNAL_ERROR
      - MASTER_UNAVAILABLE
      - ACCOUNT_DISABLED
      - ACCOUNT_NOT_FOUND
      - API_KEY_INVALID
      - API_KEY_DISABLED
      - API_KEY_LIMIT_EXCEEDED
      - API_KEY_SIGNATURE_INVALID
      - API_KEY_TIMESTAMP_EXPIRED
      - API_KEY_NONCE_REPLAYED
      - TOTP_NOT_ENABLED
      - TOTP_CODE_INVALID
      - TOTP_CODE_REPLAYED
      - TOTP_TOO_MANY_FAILURES
      - ORDER_PLACE_FAILED
      - ORDER_CANCEL_FAILED
      - ORDER_NOT_FOUND
      - ORDER_INSUFFICIENT_BALANCE
      - ORDER_RESULT_UNKNOWN
      - WITHDRAW_2FA_REQUIRED
      - WITHDRAW_NETWORK_UNSUPPORTED
      - WITHDRAW_TOKEN_UNSUPPORTED
      - WITHDRAW_ADDRESS_INVALID
      - WITHDRAW_AMOUNT_INVALID
      - WITHDRAW_CREATE_FAILED
      - WITHDRAW_NOT_FOUND
      - WITHDRAW_RESULT_UNKNOWN
      - COPYTRADE_CONFIG_NOT_FOUND
      - COPYTRADE_CONFIG_INVALID
      - COPYTRADE_CREATE_FAILED
      - COPYTRADE_UPDATE_FAILED
      - PARTNER_USER_WALLET_NOT_READY
    AccountId:
      type: string
      pattern: "^99[0-9]{20}$"
      example: '9912345678901234564821'
    ApiKey:
      type: object
      required:
      - key_id
      - name
      - status
      - scopes
      - ip_whitelist
      - created_at
      properties:
        key_id:
          type: string
          example: pk_xxx
        name:
          type: string
          example: user trading key
        status:
          type: string
          enum:
          - active
          - revoked
          - disabled
        scopes:
          type: array
          items:
            type: string
          example:
          - trade:order
          - wallet:read
        ip_whitelist:
          type: array
          items:
            type: string
          example: []
        created_at:
          type: string
          format: date-time
        last_used_at:
          type: string
          format: date-time
          nullable: true
    CreateApiKeyData:
      allOf:
      - "$ref": "#/components/schemas/ApiKey"
      - type: object
        required:
        - secret
        properties:
          secret:
            type: string
            description: API key secret. Shown only once.
            example: sk_xxx
    PartnerUserData:
      type: object
      required:
      - partner_account_id
      - user_account_id
      - external_user_id
      - status
      - wallet_status
      - created_at
      - updated_at
      properties:
        partner_account_id:
          "$ref": "#/components/schemas/AccountId"
        user_account_id:
          "$ref": "#/components/schemas/AccountId"
        external_user_id:
          type: string
          example: user_123
        display_name:
          type: string
          example: Alice
        email:
          type: string
          format: email
          example: alice@example.com
        status:
          type: string
          enum:
          - active
          - disabled
        wallet_status:
          type: string
          enum:
          - pending
          - ready
          - failed
        wallet_address:
          type: string
          nullable: true
          description: Public EVM wallet address for the partner user, when available.
          example: '0x0000000000000000000000000000000000000000'
        proxy_address:
          type: string
          nullable: true
          description: Public proxy wallet address for the partner user, when available.
          example: '0x0000000000000000000000000000000000000000'
        wallet_created:
          type: boolean
          nullable: true
        wallet_initialized_at:
          type: string
          format: date-time
          nullable: true
        last_active_at:
          type: string
          format: date-time
          nullable: true
          description: Most recent usage time across user API keys created for this partner user.
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    PartnerUserListData:
      type: object
      required:
      - items
      properties:
        items:
          type: array
          items:
            "$ref": "#/components/schemas/PartnerUserListItem"
        next_cursor:
          type: string
          nullable: true
          description: Cursor for the next page. It is the last `user_account_id` from the current page; omit it when this field is absent.
    PartnerUserListItem:
      type: object
      required:
      - partner_account_id
      - user_account_id
      - external_user_id
      - status
      - wallet_status
      - created_at
      properties:
        partner_account_id:
          "$ref": "#/components/schemas/AccountId"
        user_account_id:
          "$ref": "#/components/schemas/AccountId"
        external_user_id:
          type: string
          example: user_123
        display_name:
          type: string
          example: Alice
        status:
          type: string
          enum:
          - active
          - disabled
        wallet_status:
          type: string
          enum:
          - pending
          - ready
          - failed
        wallet_address:
          type: string
          nullable: true
          description: Public EVM wallet address for the partner user, when available.
          example: '0x0000000000000000000000000000000000000000'
        proxy_address:
          type: string
          nullable: true
          description: Public proxy wallet address for the partner user, when available.
          example: '0x0000000000000000000000000000000000000000'
        created_at:
          type: string
          format: date-time
        last_active_at:
          type: string
          format: date-time
          nullable: true
          description: Most recent usage time across user API keys created for this partner user.
    PartnerUserCreateRequest:
      type: object
      required:
      - external_user_id
      properties:
        external_user_id:
          type: string
          description: Partner-side stable user id.
          maxLength: 128
          example: user_123
        display_name:
          type: string
          maxLength: 128
          example: Alice
        email:
          type: string
          format: email
          maxLength: 255
          example: alice@example.com
    PartnerUserApiKeyCreateRequest:
      type: object
      required:
      - name
      properties:
        name:
          type: string
          example: user trading key
        scopes:
          type: array
          description: |
            Optional scopes for the generated user API key. If omitted, the key receives these default scopes:
            `trade:read`, `trade:order`, `trade:cancel`, `wallet:read`, `positions:read`,
            `copytrade:read`, `copytrade:manage`, `afk:read`, and `afk:manage`.

            The wildcard scope `*` is not accepted for user API keys. User API key scopes must be one of:
            `trade:read`, `trade:order`, `trade:cancel`, `wallet:read`, `positions:read`,
            `copytrade:read`, `copytrade:manage`, `afk:read`, or `afk:manage`.

            `withdraw:create` is not supported for partner user API keys in V1 because withdrawals
            require account-level TOTP. To enable this permission later, first add a partner-user TOTP binding flow,
            then add `withdraw:create` to the allowed partner user key scopes.
          items:
            type: string
          example:
          - trade:order
          - wallet:read
    Wallet:
      type: object
      required:
      - account_id
      - network
      - wallet_address
      - balances
      properties:
        account_id:
          "$ref": "#/components/schemas/AccountId"
        network:
          "$ref": "#/components/schemas/Network"
        wallet_address:
          type: string
          example: '0x0000000000000000000000000000000000000000'
        proxy_wallet:
          type: string
          nullable: true
        sol_wallet:
          type: string
          nullable: true
          description: Solana deposit address.
        account_value:
          type: string
          nullable: true
          description: Account balance.
        available_trade:
          type: string
          nullable: true
          description: Available trading balance.
        deposit_addr:
          type: string
          nullable: true
          description: EVM deposit address.
        tag:
          type: string
          nullable: true
          description: Wallet alias.
        balances:
          type: array
          items:
            "$ref": "#/components/schemas/Balance"
    Balance:
      type: object
      required:
      - token
      - amount
      properties:
        token:
          type: string
          example: USDC
        token_address:
          type: string
          nullable: true
        amount:
          type: string
          example: '100.25'
    Network:
      type: string
      enum:
      - polygon
    CreateWithdrawalRequest:
      type: object
      required:
      - network
      - token
      - amount
      - destination
      - totp_code
      properties:
        network:
          "$ref": "#/components/schemas/Network"
        token:
          type: string
          description: Polygon token contract address the recipient should receive.
            Gateway always withdraws PUSD internally and passes this address to master
            as the requested output token. Supported values are USDC `0x3c499c542cEF5E3811e1192ce70d8cC03d5c3359`,
            USDC.e `0x2791Bca1f2de4661ED88A30C99A7a9449Aa84174`, USDT `0xc2132D05D31c914a87C6611C10748AEb04B58e8F`,
            and PUSD `0xC011a7E12a19f7B1f670d46F03B03f3342E82DFB`.
          enum:
          - '0x3c499c542cEF5E3811e1192ce70d8cC03d5c3359'
          - '0x2791Bca1f2de4661ED88A30C99A7a9449Aa84174'
          - '0xc2132D05D31c914a87C6611C10748AEb04B58e8F'
          - '0xC011a7E12a19f7B1f670d46F03B03f3342E82DFB'
          example: '0x2791Bca1f2de4661ED88A30C99A7a9449Aa84174'
        amount:
          type: string
          example: '10.5'
        destination:
          type: string
          example: '0x0000000000000000000000000000000000000000'
        totp_code:
          type: string
          minLength: 6
          maxLength: 6
    WithdrawalCreated:
      type: object
      required:
      - withdraw_id
      - status
      properties:
        withdraw_id:
          type: string
          example: wd_202606011200000001
        status:
          "$ref": "#/components/schemas/WithdrawalStatus"
    Withdrawal:
      allOf:
      - "$ref": "#/components/schemas/WithdrawalCreated"
      - type: object
        required:
        - network
        - token
        - amount
        - destination
        - created_at
        - updated_at
        properties:
          network:
            "$ref": "#/components/schemas/Network"
          token:
            type: string
          amount:
            type: string
          destination:
            type: string
          tx_hash:
            type: string
            nullable: true
          created_at:
            type: string
            format: date-time
          updated_at:
            type: string
            format: date-time
    WithdrawalStatus:
      type: string
      enum:
      - processing
      - submitting
      - submitted
      - succeeded
      - failed
    PlaceOrderRequest:
      type: object
      required:
      - asset
      - side
      properties:
        asset:
          type: string
        side:
          type: string
          enum:
          - buy
          - sell
        amount_usd:
          type: string
          nullable: true
        price:
          type: string
          nullable: true
        size:
          type: string
          nullable: true
        expiration:
          type: integer
          format: int64
          nullable: true
        sell_all:
          type: boolean
          default: false
        sell_percentage:
          type: string
          nullable: true
        metadata:
          "$ref": "#/components/schemas/OrderMetadata"
    OrderMetadata:
      type: object
      properties:
        title:
          type: string
        slug:
          type: string
        condition_id:
          type: string
        outcome:
          type: string
    OrderResult:
      type: object
      required:
      - order_id
      - filled
      properties:
        order_id:
          type: string
        filled:
          type: boolean
        tx_hash:
          type: string
        sell_size:
          type: string
    CancelOrderData:
      type: object
      required:
      - order_id
      - status
      properties:
        order_id:
          type: string
        status:
          type: string
          enum:
          - cancel_requested
    Order:
      type: object
      required:
      - order_id
      - status
      - asset
      - side
      properties:
        order_id:
          type: string
        status:
          "$ref": "#/components/schemas/OrderStatus"
        asset:
          type: string
        side:
          type: string
          enum:
          - buy
          - sell
        price:
          type: string
          nullable: true
        size:
          type: string
          nullable: true
        created_at:
          type: string
          format: date-time
          nullable: true
    OrderStatus:
      type: string
      enum:
      - open
      - filled
      - canceled
      - failed
      - unknown
    OrderList:
      type: object
      required:
      - items
      properties:
        items:
          type: array
          items:
            "$ref": "#/components/schemas/Order"
    Position:
      type: object
      required:
      - asset
      - size
      properties:
        asset:
          type: string
        condition_id:
          type: string
        outcome:
          type: string
        size:
          type: string
        avg_price:
          type: string
          nullable: true
        current_price:
          type: string
          nullable: true
        value:
          type: string
          nullable: true
        pnl:
          type: string
          nullable: true
    PositionList:
      type: object
      required:
      - items
      properties:
        items:
          type: array
          items:
            "$ref": "#/components/schemas/Position"
    AFKStatus:
      type: string
      enum:
      - running
      - paused
      - disabled
      description: Public AFK strategy status. Maps to master status 1, 0, 2 respectively.
    AFKStrategyInput:
      type: object
      required:
      - market
      - side
      - buy_amount
      properties:
        tag:
          type: string
          description: User-visible strategy label. Maps to master `tag`.
        market:
          type: string
          description: Market identifier or market group configured for the AFK strategy.
            Maps to master `market`.
        period:
          type: integer
          description: Trading period/window value. Maps to master `period`.
        side:
          type: integer
          enum:
          - 1
          - 2
          description: Direction filter; `1` means Up, `2` means Down. Maps to master
            `side`.
        time_start_sec:
          type: integer
          format: int64
          description: Start time in Unix seconds. Maps to master `time_start_sec`.
        time_end_sec:
          type: integer
          format: int64
          description: End time in Unix seconds. Maps to master `time_end_sec`.
        min_price:
          type: string
          description: Minimum allowed price. Decimal string.
        max_price:
          type: string
          description: Maximum allowed price. Decimal string.
        price_delta_min:
          type: string
          description: Minimum price delta filter. Decimal string.
        price_delta_max:
          type: string
          description: Maximum price delta filter. Decimal string.
        buy_amount:
          type: string
          description: Buy amount per AFK order. Decimal string.
        limit_price:
          type: string
          description: Limit order price when `limit_order_copy=1`. Decimal string.
        order_expired_ttl_seconds:
          type: integer
          description: Limit order expiration TTL in seconds.
        total_rounds:
          type: integer
          description: Maximum number of AFK trading rounds.
        take_profit_percentage:
          type: string
          description: Take-profit percentage trigger. Decimal string.
        take_profit_price:
          type: string
          description: Take-profit price trigger. Decimal string.
        stop_loss_percentage:
          type: string
          description: Stop-loss percentage trigger. Decimal string.
        stop_loss_price:
          type: string
          description: Stop-loss price trigger. Decimal string.
        limit_order_copy:
          type: integer
          enum:
          - 0
          - 1
          description: Order mode; `0` means market order, `1` means limit order.
        slippage:
          type: string
          description: Market order slippage percentage string, for example `2` means
            2%.
        use_kdj:
          type: integer
          enum:
          - 0
          - 1
          description: KDJ indicator filter switch; `0` disabled, `1` enabled.
        use_macd:
          type: integer
          enum:
          - 0
          - 1
          description: MACD indicator filter switch; `0` disabled, `1` enabled.
        use_atr:
          type: integer
          enum:
          - 0
          - 1
          description: ATR indicator filter switch; `0` disabled, `1` enabled.
    AFKStrategyUpdateInput:
      allOf:
      - "$ref": "#/components/schemas/AFKStrategyInput"
      - type: object
        properties:
          status:
            "$ref": "#/components/schemas/AFKStatus"
    AFKStrategy:
      allOf:
      - "$ref": "#/components/schemas/AFKStrategyInput"
      - type: object
        required:
